<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Joy Yoga | Madhavi Dixit</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif}
body{background:linear-gradient(120deg,#f5f3ff,#fff,#ede9fe);color:#333;scroll-behavior:smooth}

header{position:sticky;top:0;z-index:1000;backdrop-filter:blur(20px);background:rgba(255,255,255,0.3);border-bottom:1px solid rgba(255,255,255,0.3);padding:20px 40px;display:flex;justify-content:space-between;align-items:center}
nav a{margin-left:20px;text-decoration:none;color:#444;font-weight:500}
nav a:hover{color:#6d28d9}

section{padding:80px 40px;opacity:0;transform:translateY(40px);transition:0.6s}
section.show{opacity:1;transform:translateY(0)}

.hero{display:grid;grid-template-columns:1fr 1fr;align-items:center;gap:40px;opacity:1;transform:none}
.hero img{width:100%;border-radius:25px}
.hero h1{font-size:48px}

.btn{padding:14px 28px;background:linear-gradient(135deg,#7c3aed,#6d28d9);color:#fff;border-radius:30px;text-decoration:none;display:inline-block;margin:5px}

.card{background:rgba(255,255,255,0.4);backdrop-filter:blur(18px);padding:25px;border-radius:25px;box-shadow:0 10px 25px rgba(109,40,217,0.2)}
.grid{display:grid;gap:25px}
.grid-3{grid-template-columns:repeat(auto-fit,minmax(250px,1fr))}

.badge{background:#ede9fe;color:#6d28d9;padding:5px 10px;border-radius:12px;font-size:12px}

footer{text-align:center;padding:25px;background:#6d28d9;color:#fff}

input,select{width:100%;padding:12px;border-radius:12px;border:1px solid #ccc}
button{padding:14px;background:#6d28d9;color:#fff;border:none;border-radius:12px;cursor:pointer}

.sticky-cta{
 position:fixed;bottom:20px;right:20px;background:#6d28d9;color:#fff;padding:15px 20px;border-radius:30px;box-shadow:0 10px 30px rgba(0,0,0,0.2);cursor:pointer
}

</style>
</head>

<body>

<header>
  <div>
    <h2>Joy Yoga</h2>
    <span class="badge">✔ Verified Instructor</span>
  </div>
  <nav>
    <a href="#about">About</a>
    <a href="#register">Join</a>
  </nav>
</header>

<section class="hero show">
  <div>
    <h1>Move with peace.</h1>
    <p>Premium yoga sessions</p>
    <a class="btn" href="#register">Join Now</a>
    <a class="btn" href="https://wa.me/18382509304">WhatsApp</a>
  </div>
  <img src="https://images.unsplash.com/photo-1545389336-cf090694435e?auto=format&fit=crop&w=1200&q=80" />
</section>

<section id="batches">
  <h2>Batches</h2>
  <div class="grid grid-3">
    <div class="card">Weekday Slots: <span id="weekday"></span></div>
    <div class="card">Sunday Slots: <span id="sunday"></span></div>
    <div class="card">Private Slots: <span id="private"></span></div>
  </div>
</section>

<section id="pricing">
  <h2>Pricing</h2>
  <div class="grid grid-3">
    <div class="card">$50/month</div>
    <div class="card">$139.99 / 3 months</div>
    <div class="card">Private $100/month</div>
    <div class="card">Private 3 months $270</div>
  </div>
</section>

<section id="register">
  <h2>Register</h2>
  <form action="https://formsubmit.co/madhavisgp@gmail.com" method="POST">
    <input type="text" name="name" placeholder="Name" required>
    <input type="email" name="email" placeholder="Email" required>
    <input type="text" name="phone" placeholder="Phone" required>
    <select name="plan">
      <option>Weekday</option>
      <option>Sunday</option>
      <option>Private</option>
    </select>
    <button type="submit">Register</button>
  </form>
</section>

<div class="sticky-cta" onclick="window.location='#register'">Join Now</div>

<footer>© Joy Yoga</footer>

<script>
// SCROLL ANIMATION
const sections=document.querySelectorAll("section")
window.addEventListener("scroll",()=>{
 sections.forEach(sec=>{
  if(sec.getBoundingClientRect().top<window.innerHeight-100){sec.classList.add("show")}
 })
})

// SLOT SYSTEM
let slots=JSON.parse(localStorage.getItem("slots"))||{weekday:8,sunday:10,private:8}
function updateSlots(){
 document.getElementById("weekday").innerText=slots.weekday
 document.getElementById("sunday").innerText=slots.sunday
 document.getElementById("private").innerText=slots.private
}
updateSlots()
</script>

</body>
</html>
